name: ci
on:
  push:
    branches: [main, "claude/**"]
  pull_request:
jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm]
        python: ["3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - run: uv pip install --system -e ".[dev]"
      - run: ruff check .
      - run: ruff format --check .
      - run: mypy
      - run: pytest -q

  docker-arm:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - run: docker buildx build --platform linux/arm64 -f docker/Dockerfile -t fhir-mcp:arm64-test --load .
      - run: docker run --rm -d -p 8000:8000 --name fhir-mcp-test fhir-mcp:arm64-test
      - run: sleep 5 && curl -sf http://127.0.0.1:8000/sse | head -1
      - run: docker stop fhir-mcp-test
